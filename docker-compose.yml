version: "3.9"

services:
  # ─────────────────────────────────────────────
  # Django Backend (SQLite)
  #  python manage.py seed_personnel &&
  #           python manage.py seed_fiches &&
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jbesion_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      USE_POSTGRES: "False"
    volumes:
      - ./backend:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
           
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --reload"

  # ─────────────────────────────────────────────
  # React Frontend
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    container_name: jbesion_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  static_files:
  media_files:
